# Override para T6 — adiciona Sonatype Nexus à arquitectura do lab
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.sonatype.yml up -d sonatype
#   docker compose -f docker-compose.yml -f docker-compose.sonatype.yml run --rm test-app-sonatype ...
#
# NOTA: Sonatype precisa de internet para download de componentes Java no arranque.
# Por isso usa sonatype-net (sem internal:true) em vez de lab-net.

volumes:
  nexus-data:

networks:
  sonatype-net:
    driver: bridge  # acesso à internet — necessário para Nexus iniciar

services:
  sonatype:
    image: sonatype/nexus3:latest
    ports:
      - "8081:8081"
    volumes:
      - nexus-data:/nexus-data
    networks:
      - sonatype-net

  # test-app para T6: acede ao Sonatype (proxy) em vez do Verdaccio directamente
  # Está em ambas as redes: lab-net (para exfil-server) + sonatype-net (para Nexus)
  test-app-sonatype:
    build: ./lab/test-app
    networks:
      - lab-net
      - sonatype-net
    environment:
      NODE_ENV: production
      API_KEY: sk-demo-fake-abc123xyz789
      DATABASE_URL: postgresql://admin:password123@db:5432/production
      AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      GITHUB_TOKEN: ghp_fakegithubtoken123456789
      NPM_TOKEN: npm_faketoken987654321
    depends_on:
      - sonatype
      - exfil-server
