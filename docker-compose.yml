name: lab-projeto-dss

networks:
  lab-net:
    driver: bridge
    internal: true # sem saída para internet
  public-net:
    driver: bridge # acesso à internet para serviços de setup que precisam do npmjs.org

volumes:
  verdaccio-storage:
  dependencytrack-data:

services:
  # ─── LAB INFRASTRUCTURE (lab-net, sem internet) ───────────────────────────

  verdaccio:
    image: verdaccio/verdaccio:5
    networks:
      - lab-net
      - public-net
    ports:
      - "4873:4873"
    volumes:
      - ./lab/verdaccio:/verdaccio/conf
      - verdaccio-storage:/verdaccio/storage

  exfil-server:
    build: ./lab/exfil-server
    networks:
      - lab-net

  test-app:
    build: ./lab/test-app
    networks:
      - lab-net
    environment:
      # Variáveis fake que simulam um ambiente de produção real
      # O postinstall captura estas sem as conhecer por nome
      NODE_ENV: production
      API_KEY: sk-demo-fake-abc123xyz789
      DATABASE_URL: postgresql://admin:password123@db:5432/production
      AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      GITHUB_TOKEN: ghp_fakegithubtoken123456789
      NPM_TOKEN: npm_faketoken987654321
    depends_on:
      - verdaccio
      - exfil-server

  # Serviço de setup: publica o pacote demo no Verdaccio (corre uma vez)
  publisher:
    image: node:20-alpine
    networks:
      - lab-net
    volumes:
      - ./lab/supply-chain-demo:/package
    working_dir: /package
    command: >
      sh -c "
        echo '//verdaccio:4873/:_authToken=lab-token' > /root/.npmrc &&
        npm publish --registry http://verdaccio:4873 --no-git-checks
      "
    depends_on:
      - verdaccio
    profiles:
      - setup

  # Serviço de setup: gera package-lock.json com o pacote demo incluído
  # Usa lab-net (para Verdaccio) + public-net (para npmjs.org/express)
  generate-lockfile:
    image: node:20-alpine
    networks:
      - lab-net
      - public-net
    volumes:
      - ./lab/test-app:/work
    working_dir: /work
    command: >
      sh -c "
        echo '//verdaccio:4873/:_authToken=lab-token' > /root/.npmrc &&
        echo '@demo-lab:registry=http://verdaccio:4873' >> /root/.npmrc &&
        npm install --package-lock-only
      "
    depends_on:
      - verdaccio
    profiles:
      - setup

  # ─── ANALYSIS TOOLS (sem lab-net, têm internet) ────────────────────────────

  syft:
    image: anchore/syft:latest
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: "0.5"
    volumes:
      - ./lab/test-app:/app:ro
      - ./evidence/T2-syft:/evidence
    command: /app -o cyclonedx-json=/evidence/sbom.json
    profiles:
      - analysis

  npm-audit:
    image: node:20-alpine
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: "0.5"
    volumes:
      - ./lab/test-app:/app:ro
      - ./evidence/T3a-npm-audit:/evidence
    working_dir: /app
    command: >
      sh -c "
        npm audit --json > /evidence/npm-audit.json 2>&1 || true;
        npm audit > /evidence/npm-audit.txt 2>&1 || true;
        echo 'npm-audit: done'
      "
    profiles:
      - analysis

  osv-scanner:
    image: ghcr.io/google/osv-scanner:latest
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: "0.5"
    volumes:
      - ./lab/test-app:/app:ro
      - ./evidence/T3b-osv-scanner:/evidence
    command: >
      --lockfile /app/package-lock.json
      --format json
      --output /evidence/osv-scanner.json
    profiles:
      - analysis

  osv-scanner-sbom:
    image: ghcr.io/google/osv-scanner:latest
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: "0.5"
    volumes:
      - ./evidence/T2-syft:/sbom:ro
      - ./evidence/T3b-osv-sbom:/evidence
    entrypoint: ["sh", "-c"]
    command: ["cp /sbom/sbom.json /tmp/sbom.cdx.json && /osv-scanner -L /tmp/sbom.cdx.json --format json --output-file /evidence/osv-scanner-sbom.json; /osv-scanner -L /tmp/sbom.cdx.json --format table --output-file /evidence/osv-scanner-sbom.txt; echo 'osv-scanner-sbom: done'"]
    profiles:
      - analysis

  snyk:
    image: snyk/snyk:node
    platform: linux/amd64
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: "0.5"
    volumes:
      - ./lab/test-app:/app
      - ./evidence/T3c-snyk:/evidence
    working_dir: /app
    environment:
      SNYK_TOKEN: ${SNYK_TOKEN:-}
      COMMAND: "snyk test --json > /evidence/snyk.json 2>&1 || true; snyk test > /evidence/snyk.txt 2>&1 || true; echo 'snyk: done'"
    profiles:
      - analysis

  socket-cli:
    image: node:20-alpine
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: "0.5"
    volumes:
      - ./lab/supply-chain-demo:/package:ro
      - ./lab/test-app:/test-app:ro
      - ./evidence/T4-socket:/evidence
    working_dir: /test-app
    environment:
      SOCKET_CLI_API_TOKEN: ${SOCKET_TOKEN:-}
      SOCKET_ORG: ${SOCKET_ORG:-}
    command: >
      sh -c "
        npx --yes @socketsecurity/cli@latest scan create --no-interactive --json --org \"$$SOCKET_ORG\" . 2>&1 | tee /evidence/socket.txt;
        echo 'socket: done'
      "
    profiles:
      - analysis

  # ─── T6: DEPENDENCY-TRACK (monitorização contínua de SBOM) ───────────────────

  dependencytrack:
    image: dependencytrack/bundled:4.13.6
    networks:
      - public-net
    ports:
      - "8080:8080"
    volumes:
      - dependencytrack-data:/data
    environment:
      ALPINE_ADMIN_PASSWORD: ${DT_ADMIN_PASSWORD}
      JAVA_TOOL_OPTIONS: "-Xmx4G"
    mem_limit: 5g
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    profiles:
      - dependencytrack
