name: voip-manager-prototype

# Dependency-Track para monitorização contínua do SBOM.
# Independente da infra do lab — representa o que uma PME real correria internamente.
#
# Uso:
#   docker compose up -d
#   Aguardar ~60s (JVM + sync inicial de CVEs)
#   Abrir http://localhost:8080  (admin / ver DT_ADMIN_PASSWORD no .env)
#
# Após a pipeline GitHub Actions correr, fazer upload do artefacto sbom.cdx.json
# em Projects → voip-manager-api → Components (ou via API — ver prototype/README.md).

services:
  dependencytrack:
    image: dependencytrack/bundled:4.13.6
    ports:
      - "8080:8080"
    volumes:
      - dependencytrack-data:/data
    environment:
      ALPINE_ADMIN_PASSWORD: ${DT_ADMIN_PASSWORD}
      JAVA_TOOL_OPTIONS: "-Xmx4G"
    mem_limit: 5g
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  dependencytrack-data:
