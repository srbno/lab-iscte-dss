name: Security Pipeline

# Corre em qualquer branch, mas apenas quando prototype/ é alterado
on:
  push:
    paths:
      - 'prototype/**'
  pull_request:
    paths:
      - 'prototype/**'
  workflow_dispatch:   # permite execução manual (útil para demos)

permissions:
  contents: read
  issues: write   # necessário para criar/comentar issues de alerta

jobs:
  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Camada 1: Prevenção ────────────────────────────────────────────────
      # pnpm v10 bloqueia lifecycle scripts por omissão (--ignore-scripts).
      # Um postinstall malicioso (como o demonstrado no lab) não seria executado.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: prototype/app/pnpm-lock.yaml

      - name: Install dependencies (lifecycle scripts blocked)
        working-directory: prototype/app
        run: pnpm install --ignore-scripts

      # ── Camada 2: Detecção reactiva ───────────────────────────────────────
      # OSV Scanner verifica o lockfile contra a base de dados OSV (Google).
      # lodash@4.17.11 tem 7 CVEs conhecidos — esta etapa vai detectá-los.
      - name: Run OSV Scanner
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/google/osv-scanner:latest \
            --lockfile /workspace/prototype/app/pnpm-lock.yaml \
            --format json \
            --output-file /workspace/osv-report.json \
          && echo "VULN_FOUND=0" >> $GITHUB_ENV \
          || echo "VULN_FOUND=1" >> $GITHUB_ENV

      # ── Gerar tabela estruturada de vulnerabilidades ──────────────────────
      # Extrai do JSON: pacote, versão, GHSA, CVE, CVSS, severidade,
      # descrição e versão corrigida. Escrito em ficheiro para reutilização
      # no Job Summary e na Issue sem duplicar a query jq.
      - name: Build vulnerability table
        if: env.VULN_FOUND == '1'
        run: |
          jq -r '
            .results[].packages[] |
            . as $pkg |
            .groups[] |
            . as $grp |
            ($pkg.vulnerabilities[] | select(.id == $grp.ids[0])) as $vuln |
            (($grp.max_severity // "0") | tonumber) as $score |
            (if $score >= 9.0 then "🔴 CRITICAL"
             elif $score >= 7.0 then "🟠 HIGH"
             elif $score >= 4.0 then "🟡 MEDIUM"
             else "🟢 LOW" end) as $sev |
            [
              $pkg.package.name + "@" + $pkg.package.version,
              ("[" + $grp.ids[0] + "](https://osv.dev/" + $grp.ids[0] + ")"),
              ([$grp.aliases[] | select(startswith("CVE-"))] | first // "—"),
              (($grp.max_severity // "—") + " " + $sev),
              ($vuln.summary // "—"),
              ([$vuln.affected[].ranges[].events[] | select(has("fixed")) | .fixed] | first // "—")
            ] | "| " + join(" | ") + " |"
          ' osv-report.json > vuln-rows.txt 2>/dev/null || echo "| — | — | — | — | Erro ao processar JSON | — |" > vuln-rows.txt

          {
            echo "| Pacote | GHSA | CVE | CVSS / Severidade | Descrição | Versão corrigida |"
            echo "|--------|------|-----|-------------------|-----------|-----------------|"
            cat vuln-rows.txt
          } > vuln-table.md

      - name: Upload OSV report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osv-report
          path: osv-report.json

      # ── Camada 3: Inventário (SBOM) ───────────────────────────────────────
      # Syft gera um SBOM CycloneDX com todos os componentes.
      # O SBOM pode ser carregado no Dependency-Track para monitorização contínua.
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: prototype/app
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom-voip-manager

      # ── Job Summary (sempre visível no separador Actions) ─────────────────
      - name: Write job summary
        if: always()
        run: |
          if [ "$VULN_FOUND" = "1" ]; then
            STATUS="🔴 Vulnerabilidades detectadas"
          else
            STATUS="🟢 Nenhuma vulnerabilidade conhecida"
          fi

          {
            echo "## Security Pipeline — Resultado"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Estado** | ${STATUS} |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo ""
            echo "### Camadas executadas"
            echo "- ✅ **Prevenção** — \`pnpm install --ignore-scripts\` (lifecycle scripts bloqueados)"
            echo "- $([ "$VULN_FOUND" = "1" ] && echo "🔴" || echo "✅") **Detecção** — OSV Scanner"
            echo "- ✅ **Inventário** — SBOM CycloneDX gerado (artefacto: \`sbom-voip-manager\`)"
            if [ "$VULN_FOUND" = "1" ] && [ -f vuln-table.md ]; then
              echo ""
              echo "### Vulnerabilidades encontradas"
              echo ""
              cat vuln-table.md
            fi
          } >> $GITHUB_STEP_SUMMARY

      # ── Alerta via GitHub Issue ───────────────────────────────────────────
      # Se CVEs detectados: cria uma issue ou adiciona comentário à issue
      # existente (evita duplicados). Usa GITHUB_TOKEN automático — sem setup.
      - name: Create or update security alert issue
        if: env.VULN_FOUND == '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABEL="security-alert"

          # Garantir que a label existe
          gh label create "$LABEL" \
            --color "d93f0b" \
            --description "Dependência vulnerável detectada pela pipeline de segurança" \
            2>/dev/null || true

          VULN_TABLE=$(cat vuln-table.md 2>/dev/null || echo "Ver artefacto osv-report para detalhes.")

          BODY="## Vulnerabilidades detectadas pela pipeline de segurança

          **Branch:** \`${{ github.ref_name }}\`
          **Commit:** \`${{ github.sha }}\`
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ### Dependências afectadas

          ${VULN_TABLE}

          ### Recomendação

          Actualizar as dependências para as versões corrigidas indicadas na tabela e fechar esta issue."

          # Verificar se já existe issue aberta com esta label
          EXISTING=$(gh issue list \
            --label "$LABEL" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            # Adicionar comentário à issue existente
            gh issue comment "$EXISTING" --body \
              "### Nova detecção — \`${{ github.ref_name }}\` @ \`$(echo "${{ github.sha }}" | cut -c1-7)\`

          ${VULN_TABLE}

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Comentário adicionado à issue #${EXISTING}"
          else
            # Criar nova issue
            gh issue create \
              --title "[Security] CVEs detectados em voip-manager-api" \
              --body "$BODY" \
              --label "$LABEL"
            echo "Issue de segurança criada"
          fi

      # ── Falha explícita do job — ÚLTIMO PASSO ────────────────────────────
      # Corre depois da issue criada. O job termina vermelho — visível
      # imediatamente na lista de runs e nas notificações do GitHub.
      - name: Fail pipeline if vulnerabilities found
        if: env.VULN_FOUND == '1'
        run: |
          echo "::error::CVEs detectados — ver issue de segurança aberta neste repositório"
          exit 1
